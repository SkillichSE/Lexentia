name: Telegram Test

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["AI Benchmark"]
    types:
      - completed

permissions:
  contents: read

jobs:
  telegram-test:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests

      - name: Send Telegram Test
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python src/notify_telegram.py

name: AI Benchmark

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 480
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: pip install requests feedparser

      - name: Benchmark all Groq free models
        continue-on-error: true
        timeout-minutes: 70
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: cd src && python benchmark.py --providers groq

      - name: Benchmark all OpenRouter free models
        continue-on-error: true
        timeout-minutes: 100
        env:
          OPENROUTER_API_KEY_1: ${{ secrets.OPENROUTER_API_KEY_1 }}
          OPENROUTER_API_KEY_2: ${{ secrets.OPENROUTER_API_KEY_2 }}
          OPENROUTER_API_KEY_3: ${{ secrets.OPENROUTER_API_KEY_3 }}
          OPENROUTER_API_KEY_4: ${{ secrets.OPENROUTER_API_KEY_4 }}
          OPENROUTER_API_KEY_5: ${{ secrets.OPENROUTER_API_KEY_5 }}
          OPENROUTER_API_KEY_6: ${{ secrets.OPENROUTER_API_KEY_6 }}
          OPENROUTER_API_KEY_7: ${{ secrets.OPENROUTER_API_KEY_7 }}
          OPENROUTER_API_KEY_8: ${{ secrets.OPENROUTER_API_KEY_8 }}
          OPENROUTER_API_KEY_9: ${{ secrets.OPENROUTER_API_KEY_9 }}
          OPENROUTER_API_KEY_10: ${{ secrets.OPENROUTER_API_KEY_10 }}
        run: cd src && python benchmark.py --providers openrouter --merge

      - name: Benchmark all Google free models
        continue-on-error: true
        timeout-minutes: 50
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: cd src && python benchmark.py --providers google --merge

      - name: Benchmark all SambaNova free models
        continue-on-error: true
        timeout-minutes: 50
        env:
          SAMBANOVA_API_KEY: ${{ secrets.SAMBANOVA_API_KEY }}
        run: cd src && python benchmark.py --providers sambanova --merge

      - name: Benchmark all Cerebras free models
        continue-on-error: true
        timeout-minutes: 35
        env:
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
        run: cd src && python benchmark.py --providers cerebras --merge

      - name: Benchmark all Together free models
        continue-on-error: true
        timeout-minutes: 35
        env:
          TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
        run: cd src && python benchmark.py --providers together --merge

      - name: News
        continue-on-error: true
        run: cd src && python news_parser.py

      - name: Commit
        run: |
          git config user.name "Benchmark Bot"
          git config user.email "bot@benchmark.ai"
          git add docs/data/results/ || true
          if git diff --staged --quiet; then
            echo "no changes"
          else
            git commit -m "Benchmark — $(date +'%Y-%m-%d')"
            git push
            echo "Pushed"
          fi

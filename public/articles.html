<!DOCTYPE html>
<html lang="en">
<head>
  <script>(function(){
    var t = localStorage.getItem('theme') || 'dark';
    document.documentElement.setAttribute('data-theme', t);
  })();</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Klyxe — Lab Article</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="style-spacing.css">
  <link rel="stylesheet" href="animations.css">
  <link rel="stylesheet" href="lab.css">
  <!-- Chart.js нужен только для статьи 5 (Token Tracker), Three.js — для статьи 3 (Word 3D).
       Оба подключены глобально, чтобы lab-article.js не управлял динамической загрузкой. -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="app.js"></script>
</head>
<body>

<header class="header" id="app-bar">
  <div class="header-content">
    <a href="index.html" class="logo" style="padding-left:0;margin-left:0;">
      <img src="media/L_logo.png" alt="Klyxe logo" class="logo-icon" style="margin-left:0;">
      <span style="font-size:17px;font-weight:700;letter-spacing:-0.02em;">Klyxe</span>
    </a>
    <div style="flex:1;"></div>
    <a href="lab.html" class="lab-btn-secondary" style="display:inline-flex;align-items:center;gap:6px;text-decoration:none;padding:7px 14px;">
      <svg width="12" height="12" viewBox="0 0 16 16" fill="none">
        <path d="M10 3L5 8l5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Back to Lab
    </a>
    <div class="theme-switch-wrap" style="margin-left:16px;">
      <span class="theme-switch-label" id="theme-label">Dark</span>
      <label class="theme-switch" aria-label="Toggle theme">
        <input type="checkbox" id="theme-toggle">
        <span class="theme-switch-track"></span>
        <span class="theme-switch-thumb" id="thumb-icon"></span>
      </label>
    </div>
  </div>
</header>

<div class="sidebar-overlay" id="sidebar-overlay"></div>

<div class="app-layout">
  <lex-sidebar></lex-sidebar>
  <div class="sidebar-main">
    <main class="container" style="padding-top:32px;">
      <div id="article-container"></div>
    </main>
  </div>
</div>

<script src="lab-article.js"></script>
<script src="sidebar.js"></script>
</body>
</html>
